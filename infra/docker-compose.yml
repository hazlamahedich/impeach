# Docker Compose Platform Stack — IIP v1
#
# @rules AC-3, STR-2 (6-process split), D9, D15, NFR-O-1, NFR-S-5
# @adr ADR-001, ADR-004, ADR-005, ADR-021
#
# Single-workstation topology (TRANSITIONAL — AC-3). All external dependencies
# are behind env-driven interfaces (SC-5 → multi-node = deployment change).
#
# NOTE: Relative paths in this file resolve from infra/ (the compose file dir).
# Build contexts use `..` to reach the project root.
#
# Usage:
#   docker compose -f infra/docker-compose.yml up -d --wait
#   docker compose -f infra/docker-compose.yml ps
#   docker compose -f infra/docker-compose.yml down -v
#
# Image tags are pinned to stable releases as of 2026-06-23. Verify on Docker Hub
# before production use; override via IIP_*_IMAGE env vars or compose overrides.

name: iip

services:
  # ─── Data Layer ────────────────────────────────────────────────

  postgres:
    # Uses Story 1.2 custom image (PG16 + AGE + pgvector + pg_trgm).
    # Default is pinned to the Story 1.2 digest; override via IIP_PG_AGE_VECTOR_IMAGE.
    image: ${IIP_PG_AGE_VECTOR_IMAGE:-ghcr.io/iip/postgres-age-pgvector:pg16@sha256:9bde235139bfd00f266624e99e936c31a4abcfe7f4e287560d66ee5fb18c796e}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-iip}
    # Host port defaults to 5433 to avoid conflicts with local Postgres.
    ports:
      - "${PG_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/age/migrations:/age-migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-iip}"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    # Host port defaults to 6380 to avoid conflicts with local Redis.
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-25T11-22-23Z
    command: server /data --console-address ":9001"
    # Host ports default to 9100/9001 to avoid conflicts with local MinIO.
    ports:
      - "${MINIO_HOST_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5

  # MinIO bucket init sidecar — creates raw-snapshots bucket idempotently
  minio-init:
    image: minio/mc:RELEASE.2025-07-25T11-22-23Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/init-bucket.sh:/init-bucket.sh:ro
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RAW_SNAPSHOTS_BUCKET: ${RAW_SNAPSHOTS_BUCKET:-raw-snapshots}
    restart: "no"

  # ─── LLM ────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:0.6.2
    # Internal-only — NOT exposed externally (Dev Notes point 4, NFR-S-5 spirit).
    # Apps connect via Docker network: http://ollama:11434
    volumes:
      - ollamadata:/root/.ollama
    # GPU passthrough — uncomment for NVIDIA (Linux)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'qwen3:14b'"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 20

  # Ollama model pre-pull sidecar — pulls qwen3:14b before first serve
  ollama-pull:
    image: ollama/ollama:0.6.2
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./runner/ollama-pull.sh:/ollama-pull.sh:ro
    entrypoint: ["/bin/sh", "/ollama-pull.sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
    restart: "no"

  # ─── Database migrations + AGE boot (ordering: Drizzle first, AGE second) ───

  db-migrate:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/api'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iip}?options=-c%20search_path%3Dag_catalog%2Cpublic
    entrypoint: ["sh", "-c", "pnpm --filter @iip/db exec drizzle-kit migrate"]
    restart: "no"

  age-boot:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/api'
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iip}?options=-c%20search_path%3Dag_catalog%2Cpublic
    entrypoint: ["sh", "-c", "pnpm db:age-boot"]
    restart: "no"

  # ─── App Processes (6-process split — STR-2, ADR-021) ───────────
  # Healthchecks run the actual built stub entrypoint and grep for "alive:"
  # to prove the package compiled and the process starts. Generous start_period
  # covers cold CI builds of the shared Dockerfile.

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/api'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      age-boot:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iip}?options=-c%20search_path%3Dag_catalog%2Cpublic
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RAW_SNAPSHOTS_BUCKET: ${RAW_SNAPSHOTS_BUCKET:-raw-snapshots}
    healthcheck:
      test: ["CMD-SHELL", "APP_DIR=$(echo $APP_NAME | cut -d/ -f2) && node apps/$APP_DIR/dist/index.js | grep -q 'alive:'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

  ingest-worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/ingest-worker'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      age-boot:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iip}?options=-c%20search_path%3Dag_catalog%2Cpublic
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RAW_SNAPSHOTS_BUCKET: ${RAW_SNAPSHOTS_BUCKET:-raw-snapshots}
    healthcheck:
      test: ["CMD-SHELL", "APP_DIR=$(echo $APP_NAME | cut -d/ -f2) && node apps/$APP_DIR/dist/index.js | grep -q 'alive:'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

  serve-worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/serve-worker'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      age-boot:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iip}?options=-c%20search_path%3Dag_catalog%2Cpublic
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RAW_SNAPSHOTS_BUCKET: ${RAW_SNAPSHOTS_BUCKET:-raw-snapshots}
    healthcheck:
      test: ["CMD-SHELL", "APP_DIR=$(echo $APP_NAME | cut -d/ -f2) && node apps/$APP_DIR/dist/index.js | grep -q 'alive:'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

  audit-worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/audit-worker'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      age-boot:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iip}?options=-c%20search_path%3Dag_catalog%2Cpublic
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RAW_SNAPSHOTS_BUCKET: ${RAW_SNAPSHOTS_BUCKET:-raw-snapshots}
    healthcheck:
      test: ["CMD-SHELL", "APP_DIR=$(echo $APP_NAME | cut -d/ -f2) && node apps/$APP_DIR/dist/index.js | grep -q 'alive:'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

  enqueuer:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/enqueuer'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      age-boot:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iip}?options=-c%20search_path%3Dag_catalog%2Cpublic
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RAW_SNAPSHOTS_BUCKET: ${RAW_SNAPSHOTS_BUCKET:-raw-snapshots}
    healthcheck:
      test: ["CMD-SHELL", "APP_DIR=$(echo $APP_NAME | cut -d/ -f2) && node apps/$APP_DIR/dist/index.js | grep -q 'alive:'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
      args:
        APP_NAME: '@iip/web'
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "APP_DIR=$(echo $APP_NAME | cut -d/ -f2) && node apps/$APP_DIR/dist/index.js | grep -q 'alive:'"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10

  # ─── Reverse Proxy ──────────────────────────────────────────────

  caddy:
    image: caddy:2.8-alpine
    # Host ports default to 8080/8443 to avoid requiring root privileges.
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ─── Observability (NFR-O-1) ────────────────────────────────────
  # VAL-9 specifies Tempo for gate-invocation tracing — NOT Jaeger.
  # Only Grafana is exposed on the host by default.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      - tempo
    # Internal-only; apps send traces via Docker network.

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempodata:/var/tempo
    # Internal-only; Grafana queries via Docker network.

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    # Internal-only; Grafana queries via Docker network.

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    depends_on:
      - prometheus
      - tempo

# ─── Named Volumes ─────────────────────────────────────────────────

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:
  caddydata:
  caddyconfig:
  prometheusdata:
  grafanadata:
  tempodata:
