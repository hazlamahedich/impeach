# Grafana dashboard provider provisioning
#
# @rules NFR-O-1
# Dashboards are loaded from /var/lib/grafana/dashboards/ inside the container.

apiVersion: 1

providers:
  - name: 'IIP Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
