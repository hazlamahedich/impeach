# OpenTelemetry Collector configuration
#
# @rules VAL-9, NFR-O-1
# @adr ADR-001
#
# Receives OTLP (gRPC + HTTP) from app instrumentations.
# Forwards traces to Tempo, metrics to Prometheus (via exporter).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Traces → Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Metrics → Prometheus (exposed on collector for scraping)
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
