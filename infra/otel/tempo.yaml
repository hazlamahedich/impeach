# Minimal Tempo configuration for IIP
#
# @rules VAL-9, NFR-O-1
# Uses local storage backend for single-workstation dev.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
