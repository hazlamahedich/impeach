name: chaos

# Story 2.9a — Chaos Infrastructure & Baseline (SC-6, AC-2).
#
# SOFT GATE (AC #5, D14): a chaos-suite failure logs a WARNING and does NOT
# block merge. Hard gate (merge-blocking) is deferred to Story 2.9b once the
# golden corpus lands (Epic 4) and citation-invariant verification at 500 RPS
# becomes deterministic enough to gate on.
#
# Why soft, for now:
#   1. Chaos tests are inherently non-deterministic — timing, container
#      scheduling, and network jitter all vary run-to-run. A hard gate at
#      this stage would be a merge pipeline DoS (flaky blocks > real regressions).
#   2. The serving path is still stubbed (Story 1.1 process stubs); the
#      baseline ramp measures the STACK (Caddy + compose + container
#      orchestration), not application throughput. A hard gate here would
#      measure nothing actionable.
#   3. Branch protection: this check is intentionally NOT required. The
#      non-blocking posture is documented in docs/ci/branch-protection.md
#      and surfaced via the job summary.
#
# Self-hosted runner (AC #5, SEC-4, ADR-019): chaos needs Docker Compose +
# k6 + (optionally) toxiproxy, none of which fit the ephemeral ubuntu-latest
# model. The runner is logically isolated from the corpus/GPU workstation
# (docs/ci/runner-setup.md). Runner label: `self-hosted-iip-chaos`.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref — chaos runs are expensive (compose
# bring-up + 90s ramp + fault scenarios); no point queuing stale ones.
concurrency:
  group: chaos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chaos:
    name: chaos gate (soft — Story 2.9a, SC-6)
    # Self-hosted runner with Docker Compose + k6. Falls back to ubuntu-latest
    # with `continue-on-error` so the workflow is valid even before the runner
    # is registered — the first step detects availability and no-ops cleanly.
    runs-on: [self-hosted, iip-chaos]
    # SOFT GATE: a failure here surfaces as a warning, NOT a merge block.
    # Hard gate is Story 2.9b (golden corpus + 500 RPS + citation invariant).
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify chaos prerequisites (k6 v0.50.x + docker compose)
        id: prereqs
        run: |
          set -e
          miss=""
          command -v k6              >/dev/null 2>&1 || miss="${miss} k6"
          command -v docker          >/dev/null 2>&1 || miss="${miss} docker"
          docker compose version     >/dev/null 2>&1 || miss="${miss} docker-compose"
          if [ -z "${miss}" ]; then
            if ! docker info >/dev/null 2>&1; then
              miss="${miss} docker-daemon"
            fi
            k6_ver="$(k6 version 2>/dev/null | head -1 || echo 'unknown')"
            case "${k6_ver}" in
              *v0.50.*) ;;
              *) miss="${miss} k6-version(${k6_ver})"; echo "::warning::expected k6 v0.50.x, found ${k6_ver}" ;;
            esac
          fi
          if [ -n "${miss}" ]; then
            echo "prereqs_missing=${miss}" >> "$GITHUB_OUTPUT"
            echo "::warning::chaos prerequisites missing on runner:${miss}"
            echo "Install: brew install k6 (or go install go.k6.io/k6@v0.50.0); ensure Docker + Compose plugin daemon are running."
          else
            echo "k6: $(k6 version | head -1)"
            docker compose version
          fi

      - name: Skip on missing prereqs (soft gate — do not fail)
        if: steps.prereqs.outputs.prereqs_missing != ''
        run: |
          echo "::notice::chaos skipped — runner missing:${{ steps.prereqs.outputs.prereqs_missing }}. See docs/ci/runner-setup.md."
          echo "SOFT_GATE_SKIPPED=true" >> "$GITHUB_ENV"

      - name: Bring up compose stack
        if: env.SOFT_GATE_SKIPPED != 'true'
        run: |
          docker compose -f infra/docker-compose.yml up -d --wait --wait-timeout 300
          # Sanity: /healthz via Caddy on :8080 must return 200 before we load it.
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 http://localhost:8080/healthz || echo 000)
            [ "$code" = "200" ] && break
            sleep 2
          done
          [ "$code" = "200" ] || { echo "::error::compose /healthz never returned 200"; exit 1; }

      - name: Baseline load characterization (k6 ramp 10 -> 50 -> 100 RPS)
        if: env.SOFT_GATE_SKIPPED != 'true'
        run: |
          # SOFT: k6 --quiet still exits non-zero on threshold breach. We capture
          # the exit code, archive the summary, and surface a warning rather than
          # failing the job (continue-on-error at the job level already enforces
          # this, but an explicit message is friendlier than a silent green).
          set +e
          k6 run --quiet tools/chaos/chaos-suite.js > chaos-summary.txt 2>&1
          rc=$?
          cat chaos-summary.txt
          if [ $rc -ne 0 ]; then
            echo "::warning::chaos baseline ramp reported threshold breaches (k6 exit ${rc}). Non-blocking (soft gate) — see chaos-summary.txt. Hard gate is Story 2.9b."
          else
            echo "::notice::chaos baseline ramp passed all soft thresholds."
          fi

      - name: Failure-injection — node-loss (resilience only, AC #3)
        if: env.SOFT_GATE_SKIPPED != 'true'
        run: |
          # One representative scenario per PR run (full matrix is nightly / 2.9b).
          # node-loss is the cheapest deterministic scenario (no toxiproxy dep).
          set +e
          bash tools/chaos/inject-failures.sh node-loss > node-loss.txt 2>&1
          rc=$?
          cat node-loss.txt
          if [ $rc -ne 0 ]; then
            echo "::warning::chaos node-loss scenario FAILED (exit ${rc}). Non-blocking (soft gate). See node-loss.txt."
          fi

      - name: Upload chaos artifacts
        if: always() && env.SOFT_GATE_SKIPPED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: chaos-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            chaos-summary.txt
            node-loss.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down compose stack
        if: always() && env.SOFT_GATE_SKIPPED != 'true'
        run: |
          docker compose -f infra/docker-compose.yml down -v --remove-orphans || true

      - name: Soft-gate summary
        if: always()
        run: |
          echo "## Chaos gate (soft — Story 2.9a)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${SOFT_GATE_SKIPPED:-false}" = "true" ]; then
            echo "⚠️ **Skipped** — runner missing prerequisites. See job log." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Status:** soft-gate result recorded (non-blocking)." >> "$GITHUB_STEP_SUMMARY"
            echo "- **Hard gate:** deferred to Story 2.9b (golden corpus + 500 RPS + citation invariant)." >> "$GITHUB_STEP_SUMMARY"
            echo "- **Why soft:** chaos is non-deterministic; serving path is stubbed (Story 1.1). See \`docs/ci/branch-protection.md\`." >> "$GITHUB_STEP_SUMMARY"
          fi
