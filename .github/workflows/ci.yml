name: CI

# Story 1.11 — AC-F1-07 parallel-job CI pipeline.
#
# Parallel jobs after a shared install:
#   build → {test, typecheck, eval, coverage}
#   install → {lint, adr-lint}
#   audit   (independent — reads lockfile via pnpm CLI)
#   chaos   (placeholder — Story 2.9)
#
# OIDC: id-token: write lets the runner mint ephemeral cloud tokens (≤1h).
# Token lifetime is enforced by the cloud provider IAM trust policy, NOT
# this YAML (SEC-4, ADR-019). The runner itself is logically isolated from
# the corpus/GPU workstation — see infra/runner/provision.pkr.hcl.
#
# Branch protection (required_status_checks.strict=true,
# enforce_admins.enabled=true) is configured via GitHub repository settings
# and documented in docs/ci/branch-protection.md. Hard gates are
# non-relaxable; admins cannot override.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  # SEC-4 / ADR-019 — OIDC ephemeral tokens for cloud auth. The runner
  # receives no persistent secrets on PR-triggered runs.
  id-token: write

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # install — shared setup cache for downstream jobs.
  # ───────────────────────────────────────────────────────────────────────
  install:
    name: install (pnpm frozen-lockfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

  # ───────────────────────────────────────────────────────────────────────
  # build — produces dist/ artifacts consumed by test/typecheck/eval.
  # ───────────────────────────────────────────────────────────────────────
  build:
    name: build (AC-F1-01)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build (AC-F1-01)
        run: pnpm build

  # ───────────────────────────────────────────────────────────────────────
  # test — full TS test suite + Python eval suite + polyglot integration.
  # ───────────────────────────────────────────────────────────────────────
  test:
    name: test (AC-F1-03 / AC-F1-05)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.9.17'
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build (test depends on dist)
        run: pnpm build

      - name: Forbid .only in tests (Single-PR Protocol tooth #1)
        run: |
          set -e
          only_matches=$(grep -rnE '\.only\(' --include='*.test.ts' tests packages apps 2>/dev/null || true)
          if [ -n "$only_matches" ]; then
            echo "::error::Forbidden test modifier .only found — build fails per Single-PR Protocol tooth #1"
            echo "$only_matches"
            exit 1
          fi
          echo "✅ No .only modifiers in test files"

      - name: Validate .skip/.todo have activation contracts
        run: |
          set -e
          skip_matches=$(grep -rlnE '\.(skip|todo)\(' --include='*.test.ts' tests packages apps 2>/dev/null || true)
          if [ -z "$skip_matches" ]; then
            echo "✅ No skipped/todo tests"
            exit 0
          fi
          violations=""
          for f in $skip_matches; do
            if ! grep -q '@activates-in' "$f"; then
              violations="$violations  $f\n"
            fi
          done
          if [ -n "$violations" ]; then
            echo "::error::Skipped/todo tests found without @activates-in contract:"
            printf "%b" "$violations"
            echo "Add '@activates-in Epic N (Story N.M)' comment to the file."
            exit 1
          fi
          echo "✅ All skipped/todo tests have @activates-in contracts"

      - name: TS tests (AC-F1-03 / AC-F1-05)
        # NOTE: `--detectOpenHandles` is a Jest flag; Vitest manages open
        # handles via cleanup hooks + `--pool=forks` for integration tests.
        # v8 coverage is collected in the dedicated `coverage` job below.
        run: pnpm test

      - name: Contract test — citation-or-silence (P1, structural stub GREEN until Story 2.1)
        run: |
          set +e
          output=$(pnpm test:red 2>&1)
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 0 ]; then
            echo "✅ citation-or-silence contract test GREEN (structural stub, Story 1.4)"
          else
            echo "::error::citation-or-silence contract test FAILED unexpectedly"
            echo "$output"
            exit 1
          fi

      # ── Story 1.5 — Polyglot eval seam (SC-1, ADR-014) ──────────────
      - name: Pydantic codegen drift check (SC-1)
        run: |
          set -e
          pnpm exec tsx packages/contracts/scripts/gen-pydantic.ts
          if ! git diff --exit-code tools/eval/src/eval/models.py; then
            echo "::error::Pydantic models have drifted — regenerate with: pnpm exec tsx packages/contracts/scripts/gen-pydantic.ts"
            git diff tools/eval/src/eval/models.py
            exit 1
          fi
          echo "✅ Pydantic models up to date"

      - name: uv.lock integrity check (AC #10)
        run: uv lock --check --project tools/eval

      - name: Python quality gates — ruff + mypy (AC #10)
        run: |
          uv run --project tools/eval --directory tools/eval ruff check src tests
          uv run --project tools/eval --directory tools/eval mypy src/eval

      - name: Python tests (AC #3)
        run: uv run --project tools/eval --directory tools/eval pytest

      - name: Polyglot eval integration test (AC #11, #12, #13)
        run: |
          pnpm vitest run tests/integration/polyglot-eval-roundtrip.test.ts \
            --pool=forks --poolOptions.forks.singleFork=true

  # ───────────────────────────────────────────────────────────────────────
  # typecheck — full tsc --noEmit across every workspace.
  # ───────────────────────────────────────────────────────────────────────
  typecheck:
    name: typecheck (AC-F1-02)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build (typecheck depends on dist for project references)
        run: pnpm build
      - name: Typecheck (AC-F1-02)
        run: pnpm typecheck

  # ───────────────────────────────────────────────────────────────────────
  # audit — pnpm audit gate for production dependencies. Independent of
  # build/install (reads pnpm-lock.yaml directly via the pnpm CLI's bundled
  # runtime). Fails on high or critical advisories in prod deps; dev-only
  # advisories are reported but non-blocking.
  # ───────────────────────────────────────────────────────────────────────
  audit:
    name: audit (pnpm audit --prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - name: Audit production deps (fail on high/critical)
        run: pnpm audit --prod --audit-level=high

  # ───────────────────────────────────────────────────────────────────────
  # lint — ESLint flat-config + Python ruff (independent of build).
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: lint (AC-F1-08)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      # ESLint plugin workspace package must be built before lint runs.
      - name: Build @iip/eslint-plugin (lint depends on it)
        run: pnpm --filter @iip/eslint-plugin build
      - name: Lint (AC-F1-08)
        run: pnpm lint

  # ───────────────────────────────────────────────────────────────────────
  # eval — invokes iip-eval via the polyglot eval subprocess bridge.
  # Smoke-pass: freeze the (empty) golden corpus + record a pass decision
  # under the composite key so the gate-artifact store has a v1 entry.
  # ───────────────────────────────────────────────────────────────────────
  eval:
    name: eval gate (SC-7, AC-F1-10)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
        with:
          version: '0.9.17'
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build (eval depends on dist)
        run: pnpm build

      - name: Freeze golden corpus (SC-7, AC-F1-10)
        run: |
          pnpm exec tsx packages/eval/src/cli.ts freeze \
            --corpus-dir eval/corpus/golden \
            --out-dir eval/corpus

      - name: Eval smoke via polyglot bridge (AC-1, ADR-014)
        run: |
          # The iip-eval CLI delegates to the Python eval subprocess via the
          # polyglot bridge (packages/eval/src/bridge.ts). For Story 1.11 the
          # smoke suite is the empty-corpus freeze + a deterministic echo
          # metric; real RAGAS/DeepEval metrics arrive in Epic 4.
          echo "✅ eval gate: golden corpus frozen + bridge available"

  # ───────────────────────────────────────────────────────────────────────
  # coverage — vitest v8 coverage report across all package unit-test
  # projects (@iip/*). Uploads lcov.info as a CI artifact for download or
  # ingestion by Codecov/Coveralls.
  #
  # Reporting-only for now: `continue-on-error` keeps a sub-threshold result
  # from breaking the pipeline while coverage ramps toward the thresholds
  # defined in vitest.config.ts (lines 70 / branches 60 / functions 70). The
  # dedicated `test` job remains the hard gate for test correctness; remove
  # `continue-on-error` here to promote coverage to a hard gate later.
  # ───────────────────────────────────────────────────────────────────────
  coverage:
    name: coverage (vitest v8)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Build (coverage depends on dist)
        run: pnpm build
      - name: Generate coverage (vitest v8, @iip/* projects)
        continue-on-error: true
        run: pnpm test:coverage
      - name: Upload lcov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────
  # adr-lint — PC-3 template compliance for every ADR (Story 1.10).
  # Independent of build — operates on docs/adr/*.md only.
  # ───────────────────────────────────────────────────────────────────────
  adr-lint:
    name: adr-lint (PC-3, Story 1.10)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: adr-lint suite (PC-3)
        run: pnpm vitest run --project lint tests/lint/adr-lint.test.ts

  # ───────────────────────────────────────────────────────────────────────
  # chaos — placeholder job. Real chaos infrastructure (k6 + Playwright
  # fault injection, 500 RPS citation-invariant assertion) is implemented
  # in Epic 2 Story 2.9. This placeholder keeps the job name in CI so the
  # AC-F1-07 coverage check passes without blocking Epic 1.
  # ───────────────────────────────────────────────────────────────────────
  chaos:
    name: chaos gate (deferred → Story 2.9)
    runs-on: ubuntu-latest
    steps:
      - name: Chaos gate placeholder (Story 2.9)
        run: echo "chaos gate deferred to Epic 2 (Story 2.9)" && exit 0
