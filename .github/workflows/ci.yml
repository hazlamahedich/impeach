name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build / typecheck / lint / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm (AC-F1-09)
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node (pinned via .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Setup Python (AC #10 — 3.12.x exact)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (AC #3)
        uses: astral-sh/setup-uv@v6
        with:
          version: '0.9.17'

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build (AC-F1-01)
        run: pnpm build

      - name: Typecheck (AC-F1-02)
        run: pnpm typecheck

      - name: Forbid .only/.skip/.todo in tests (Single-PR Protocol tooth #1)
        run: |
          set -e
          matches=$(grep -rnE '\.(only|skip|todo)\(' --include='*.test.ts' tests packages apps 2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "::error::Forbidden test modifier (.only/.skip/.todo) found — build fails per Single-PR Protocol tooth #1"
            echo "$matches"
            exit 1
          fi

      - name: Lint (AC-F1-08)
        run: pnpm lint

      - name: Test (AC-F1-03 / AC-F1-05)
        run: pnpm test

      - name: Contract test — citation-or-silence (P1, structural stub GREEN until Story 2.1)
        run: |
          set +e
          output=$(pnpm test:red 2>&1)
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 0 ]; then
            # Story 1.4 stub handles structural citation presence/absence.
            # Real NLI/substring validation is Story 2.1 — the contract test
            # will go RED again when real validation tests are added.
            echo "✅ citation-or-silence contract test GREEN (structural stub, Story 1.4)"
          else
            # After Story 1.4, any RED is unexpected — the stub is deterministic.
            # Fail hard so we don't ship a broken gate.
            echo "::error::citation-or-silence contract test FAILED unexpectedly"
            echo "$output"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────
      # Story 1.5 — Polyglot eval seam (SC-1, ADR-014)
      # ─────────────────────────────────────────────────────────────

      - name: Pydantic codegen drift check (SC-1 — committed models vs fresh generation)
        run: |
          set -e
          pnpm exec tsx packages/contracts/scripts/gen-pydantic.ts
          if ! git diff --exit-code tools/eval/src/eval/models.py; then
            echo "::error::Pydantic models have drifted — regenerate with: pnpm exec tsx packages/contracts/scripts/gen-pydantic.ts"
            git diff tools/eval/src/eval/models.py
            exit 1
          fi
          echo "✅ Pydantic models up to date"

      - name: uv.lock integrity check (AC #10)
        run: uv lock --check --project tools/eval

      - name: Python quality gates — ruff + mypy (AC #10)
        run: |
          uv run --project tools/eval --directory tools/eval ruff check src tests
          uv run --project tools/eval --directory tools/eval mypy src/eval

      - name: Python tests (AC #3)
        run: uv run --project tools/eval --directory tools/eval pytest

      - name: Polyglot eval integration test (AC #11, #12, #13)
        run: |
          pnpm vitest run tests/integration/polyglot-eval-roundtrip.test.ts \
            --pool=forks --poolOptions.forks.singleFork=true
