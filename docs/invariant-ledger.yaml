  rules: [EI-1, AC-2, SEC-5]
  adr: ADR-001
  technique: [contract-test, property-test, chaos]
  severity: T1
  assertion_signature: "citation-or-silence.test.ts — POSITIVE + NEGATIVE + PC-9 invariant"
  fixtures: [golden/v1/, fixtures/citation/]
  gate: promotion
  status: green
  green_evidence: "Core citation-or-silence invariant fully enforced by packages/render/src/gate.ts (Story 2.1 done). Multi-level coverage: unit (gate-live, gate-resilience, gate-silence-context, substring), contract (citation-or-silence, render-gate-live, render-gate-substring.property), integration (render-gate-live), chaos (k6 structural). Stryker 100/100/100 on gate.ts. Runtime enforcement proven via gate-invocation-queue-pressure contract test (Story 2.8)."
  deferred_items:
    - "Retention/expiry citation detection (gate does not yet consume retention_policy/takedown_trigger; citation_expired violation kind reserved but unemitted — needs gate-enforcement follow-up)"
    - "Multi-source corroboration (single-source tier-based only; Epic 4/5)"
  owner: Amelia

