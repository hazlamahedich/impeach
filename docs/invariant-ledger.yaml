# Invariant Ledger
#
# Authority: AC-1 (eval harness = 8th architectural plane), SC-6 (chaos at F1),
# SEC-8 (mutation suite), VAL-9 (gate-invocation-per-served-response),
# PC-9 (test-pattern completeness).
#
# Each entry is an architectural invariant the system MUST maintain.
# Severity: T1 = defamation exposure | T2 = credibility | T3 = operational
# Gate: pr-check | nightly | promotion (PD-3)
#
# Created per Foundation Action Plan P4. Seeded from ADR-001 (defamation-grade).

- id: INV-001
  invariant: "Every served claim resolves to a source citation (citation-or-silence)"
  rules: [EI-1, AC-2, SEC-5]
  adr: ADR-001
  technique: [contract-test, property-test, chaos]
  severity: T1
  assertion_signature: "citation-or-silence.test.ts — POSITIVE + NEGATIVE + PC-9 invariant"
  fixtures: [golden/v1/, fixtures/citation/]
  gate: promotion
  status: yellow
  yellow_reason: "renderGate stub enforces basic null-check (null-citation claims stripped, no_evidence flag set); full validation (substring verification, trust-tier gating, source-document accessibility, corroboration requirements) deferred to Epic 2 Story 2.1"
  deferred_to: "Epic 2 Story 2.1"
  deferred_items:
    - "Citation factual accuracy / cross-reference validity"
    - "Source document accessibility / chain-of-custody"
    - "Trust-tier gating and corroboration requirements"
    - "Expired/retracted citation detection"
    - "Runtime enforcement when lint is bypassed"
  owner: Amelia

