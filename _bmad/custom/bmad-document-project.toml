# Graphify integration override for bmad-document-project
# This file is merged with the skill's customize.toml by BMad on activation.

[workflow]

persistent_facts = [
  "file:{project-root}/_bmad/custom/graphify-integration.md",
  "file:{project-root}/graphify-out/GRAPH_REPORT.md",
  "A graphify knowledge graph exists at {project-root}/graphify-out/. Use it as the primary map of the project when documenting existing artifacts. Prefer graphify query for cross-document dependency tracing before writing new documentation.",
]
