# Graphify integration override for bmad-create-architecture
# This file is merged with the skill's customize.toml by BMad on activation.

[workflow]

persistent_facts = [
  "file:{project-root}/_bmad/custom/graphify-integration.md",
  "file:{project-root}/graphify-out/GRAPH_REPORT.md",
  "A graphify knowledge graph exists at {project-root}/graphify-out/. Before proposing new architecture, query it to understand existing decisions, god nodes, and cross-community bridges. Re-running `graphify --update` is recommended if source documents changed since the last run.",
]
